<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep space dark background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Neon Glow Gradient (Blue to Purple to Magenta) -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#D946EF" />
    </linearGradient>

    <!-- Glass border gradient -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(139, 92, 246, 0.9)" />
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0.4)" />
    </linearGradient>

    <!-- Heavy Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Subtle Glow for Glass Edge and Text -->
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Outer Glass Rounded Square (Squircle) -->
  <rect x="64" y="64" width="384" height="384" rx="76" fill="rgba(255,255,255,0.02)" stroke="url(#glass-border)" stroke-width="6" filter="url(#subtle-glow)" />
  <!-- Inner Glass Reflection Edge -->
  <rect x="70" y="70" width="372" height="372" rx="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />

  <!-- The Glowing 'S' Curve -->
  <g transform="translate(0, -20)">
      <!-- Core Heavy Glow Base -->
      <path d="M 290 140 C 160 170, 150 256, 256 256 C 362 256, 352 342, 222 372" fill="none" stroke="url(#neon)" stroke-width="32" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>
      
      <!-- Inner Bright Core -->
      <path d="M 290 140 C 160 170, 150 256, 256 256 C 362 256, 352 342, 222 372" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" filter="url(#subtle-glow)" opacity="0.9"/>
      
      <!-- High-Contrast Flares (Mimicking the fluid taper) -->
      <path d="M 290 140 C 250 150, 210 170, 185 205" fill="none" stroke="#E0E7FF" stroke-width="5" stroke-linecap="round" />
      <path d="M 327 307 C 302 342, 262 362, 222 372" fill="none" stroke="#F3E8FF" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- ARIA Text -->
  <text x="256" y="415" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="14" fill="#C4B5FD" text-anchor="middle" filter="url(#subtle-glow)">ARIA</text>
</svg>
